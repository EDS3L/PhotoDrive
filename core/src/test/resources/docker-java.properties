# Wersja API Docker Engine, którą docker-java (silnik Testcontainers) ma negocjować.
#
# Docker Engine 29 USUNĄŁ obsługę wersji API starszych niż 1.44, a docker-java 3.4.2
# (spinany przez Testcontainers 1.21.3 z BOM-u Spring Boota 3.5.7) domyślnie odzywa się
# wersją 1.32. Efekt: demon odpowiada 400 na /info, a Testcontainers raportuje mylące
# „Could not find a valid Docker environment" — mimo że Docker działa poprawnie.
#
# Ten plik jest wczytywany przez docker-java z classpath testów. 1.44 jest bezpieczne
# także dla starszych silników (Docker 25+ ją obsługuje), więc działa i lokalnie, i w CI.
# Do usunięcia, gdy Spring Boot podbije Testcontainers do wersji z nowszym docker-java.
api.version=1.44
