spring:
  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 600000

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: VARCHAR
        temp:
          use_jdbc_metadata_defaults: false
    open-in-view: false
    show-sql: false
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    max-save-post-size: -1
    # Limit liczby czesci multipart (Tomcat 10.1.42+, CVE-2025-48988; domyslnie 10/50).
    # -1 = bez limitu, spojnie z reszta limitow uploadu (uploady tylko dla ADMIN/PHOTOGRAPHER).
    max-part-count: -1

jwt:
  secret: ${TOKEN_SECRETKEY}

storage:
  dir: ${DIR}
  temp:
    path: ${STORAGE_TEMP_PATH}

ORG_MAX_SIZE: ${ORG_MAX_SIZE}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  jwt:
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}
  csrf:
    allowed-origins: ${CSRF_ALLOWED_ORIGINS:https://photodrive.dev}
  cookie:
    secure: ${COOKIE_SECURE:true}

SWAGGER:
  LOGIN:
    USER: ${SWAGGER_USER}
    PASSWORD: ${SWAGGER_PASSWORD}
