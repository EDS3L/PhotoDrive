name: CI

# Bramka jakości: uruchamia testy backendu oraz lint+build frontu na każdym
# pushu i pull requeście. Workflow jest CELOWO oddzielony od publish.yml
# (build+deploy), żeby nie ingerować w działający pipeline produkcyjny.
# Aby uczynić z tego twardą bramkę PR, włącz branch protection na main
# i wymagaj statusów: "Backend — testy" oraz "Frontend — lint & build".

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend — testy (Gradle + JaCoCo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        working-directory: core
        run: ./gradlew test --no-daemon

  frontend-checks:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
