name: CI

# Bramka jakości dla gałęzi roboczych i PR. Main jest bramkowany przez
# publish.yml (checks przed build+deploy) — dlatego tutaj main pomijamy,
# żeby nie dublować przebiegów. Definicja testów/lintu jest współdzielona
# przez reużywalny checks.yml (jedno miejsce prawdy).

on:
  push:
    branches-ignore: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    with:
      backend: true
      frontend: true
