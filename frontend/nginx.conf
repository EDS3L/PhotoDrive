server {
    listen 8080;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-Frame-Options           "DENY"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api {
        set $backend http://photodrive-backend:8080;
        proxy_pass $backend;
        resolver 127.0.0.11 valid=30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto "https";

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     60s;
        proxy_buffer_size      4k;
        proxy_buffers          8 4k;

        client_max_body_size 100M;
    }

    location ~* \.(ico|css|js|gif|jpe?g|png|webp|woff2?|svg|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control           "public, immutable";
        add_header X-Content-Type-Options  "nosniff" always;
    }
}
